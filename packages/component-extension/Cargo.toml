[package]
name = "component-extension"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.12", features = ["napi4", "async"] }
napi-derive = "2.12"
flatbuffers = "23.5.26"
rusqlite = { version = "0.29", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rust-core = { path = "../rust-core" }

[build-dependencies]
napi-build = "2.0"
