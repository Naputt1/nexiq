name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      shared:
        description: "Publish @nexiq/shared"
        type: boolean
        default: false
      extension-sdk:
        description: "Publish @nexiq/extension-sdk"
        type: boolean
        default: false
      component-extension:
        description: "Publish @nexiq/component-extension"
        type: boolean
        default: false
      file-extension:
        description: "Publish @nexiq/file-extension"
        type: boolean
        default: false
      cli:
        description: "Publish @nexiq/cli (Terminal UI)"
        type: boolean
        default: false
      all:
        description: "Publish all packages"
        type: boolean
        default: false

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm --filter @nexiq/component-extension build:rs --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm --filter @nexiq/component-extension build:rs --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm --filter @nexiq/component-extension build:rs --target x86_64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm --filter @nexiq/component-extension build:rs --target x86_64-pc-windows-msvc

    name: Build Native (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Native Binary
        run: ${{ matrix.settings.build }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/component-extension/*.node
          if-no-files-found: error

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/component-extension/artifacts

      - name: Move artifacts to component-extension
        run: |
          find packages/component-extension/artifacts -name "*.node" -exec mv {} packages/component-extension/ \;
          ls -l packages/component-extension/*.node

      - name: Build Packages
        run: |
          pnpm --filter @nexiq/shared build
          pnpm --filter @nexiq/extension-sdk build
          pnpm --filter @nexiq/analyser build
          pnpm --filter @nexiq/server build
          pnpm --filter @nexiq/component-extension build:ts
          pnpm --filter @nexiq/file-extension build
          pnpm --filter @nexiq/cli build
        env:
          MODE: production

      - name: Publish @nexiq/shared
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.shared == true
        run: pnpm --filter @nexiq/shared publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/extension-sdk
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.extension-sdk == true
        run: pnpm --filter @nexiq/extension-sdk publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/component-extension
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.component-extension == true
        run: pnpm --filter @nexiq/component-extension publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/file-extension
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.file-extension == true
        run: pnpm --filter @nexiq/file-extension publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/cli
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.cli == true
        run: pnpm --filter @nexiq/cli publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
