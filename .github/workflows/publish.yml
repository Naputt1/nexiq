name: Publish Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      shared:
        description: 'Publish @nexiq/shared'
        type: boolean
        default: false
      extension-sdk:
        description: 'Publish @nexiq/extension-sdk'
        type: boolean
        default: false
      analyser:
        description: 'Publish @nexiq/analyser'
        type: boolean
        default: false
      component-extension:
        description: 'Publish @nexiq/component-extension'
        type: boolean
        default: false
      git-extension:
        description: 'Publish @nexiq/git-extension'
        type: boolean
        default: false
      cli:
        description: 'Publish @nexiq/cli'
        type: boolean
        default: false
      all:
        description: 'Publish all packages'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Packages
        run: |
          pnpm --filter @nexiq/shared build
          pnpm --filter @nexiq/extension-sdk build
          pnpm --filter @nexiq/analyser build
          pnpm --filter @nexiq/component-extension build:ts
          pnpm --filter @nexiq/git-extension build
          pnpm --filter @nexiq/cli build

      - name: Publish @nexiq/shared
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.shared == true
        run: pnpm --filter @nexiq/shared publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/extension-sdk
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.extension-sdk == true
        run: pnpm --filter @nexiq/extension-sdk publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/analyser
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.analyser == true
        run: pnpm --filter @nexiq/analyser publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/component-extension
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.component-extension == true
        run: pnpm --filter @nexiq/component-extension publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/git-extension
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.git-extension == true
        run: pnpm --filter @nexiq/git-extension publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexiq/cli
        if: |
          github.event_name == 'push' ||
          inputs.all == true ||
          inputs.cli == true
        run: pnpm --filter @nexiq/cli publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

